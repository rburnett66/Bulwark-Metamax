<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>BULWARK — Vertical Slice (Test Build)</title>
<link rel="icon" href="icons/icon-192.png">
<!-- FULLSCREEN PLAY: the manifest makes "Add to Home Screen" launch as a chromeless fullscreen app
     (the only true-fullscreen path on iOS); the in-game ⛶ button covers desktop/Android browsers. -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0c1014">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #14171c;
    color: #d8dde4;
    font-family: "Segoe UI", Arial, sans-serif;
    height: 100%;
    overflow: hidden;
  }
  #app {
    display: flex;
    flex-direction: row;
    width: 100vw;
    /* 100vh includes the area BEHIND mobile browser chrome — bottom HUD buttons rendered off-screen.
       dvh tracks the actually-visible viewport; the vh line is the fallback for old browsers. */
    height: 100vh;
    height: 100dvh;
    box-sizing: border-box;
  }
  #game-mount {
    position: relative;
    flex: 1 1 auto;
    min-width: 0;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0d0f12;
  }
  #game-mount canvas {
    display: block;
    max-width: 100%;
    max-height: 100%;
  }
  #hud-mount {
    flex: 0 0 300px;
    width: 300px;
    height: 100vh;
    height: 100dvh;
    overflow-y: auto;
    background: #1b2028;
    border-left: 2px solid #2c3440;
    box-sizing: border-box;
    padding: 8px;
    font-size: 13px;
  }
  #boot-error {
    position: fixed;
    left: 12px;
    bottom: 12px;
    max-width: 60vw;
    background: #3a1114;
    color: #ffb3b3;
    border: 1px solid #7a2b30;
    padding: 8px 12px;
    font-family: monospace;
    font-size: 12px;
    white-space: pre-wrap;
    display: none;
    z-index: 9999;
  }
</style>
</head>
<body>
  <div id="app">
    <div id="game-mount"></div>
    <div id="hud-mount"></div>
  </div>
  <div id="boot-error"></div>

  <!-- Root namespace: every module attaches its exports here (offline / file:// safe, no bundler). -->
  <script>
    (function () {
      "use strict";
      var B = window.Bulwark || {};
      B.data = B.data || {};     // src/data/tables.js
      B.sim = B.sim || {};       // src/sim/*.js
      B.render = B.render || {}; // src/render/*.js
      B.input = B.input || {};   // src/input/input.js
      B.boot = B.boot || null;   // src/main.js assigns the real boot(mountEl, seed?)
      window.Bulwark = B;

      window.__bulwarkBootError = function (msg) {
        var el = document.getElementById("boot-error");
        if (!el) return;
        el.style.display = "block";
        el.textContent += (el.textContent ? "\n" : "") + msg;
      };
      window.addEventListener("error", function (ev) {
        var where = ev.filename ? (ev.filename + ":" + ev.lineno) : "";
        window.__bulwarkBootError("[error] " + (ev.message || "script error") + (where ? " @ " + where : ""));
      });
    })();
  </script>

  <!-- Vendored library (never rewritten, offline) -->
  <script src="vendor/pixi.min.js"></script>

  <!-- Game modules are ES modules (export/import). Load the ENTRY as a module (it imports the rest in
       dependency order) and expose boot on the global the classic bootstrap below expects. Replaces the old
       25 classic <script src> tags, which the browser rejects for ESM. PIXI stays a classic global above. -->
  <script type="module">
    import { boot } from './src/main.js';
    window.Bulwark = Object.assign(window.Bulwark || {}, { boot });
  </script>

  <!-- Entry: mount and start once all classic scripts have executed in order. -->
  <script>
    (function () {
      "use strict";

      function fail(msg) {
        window.__bulwarkBootError(msg);
        // eslint-disable-next-line no-console
        console.error("[Bulwark boot] " + msg);
      }

      function start() {
        var B = window.Bulwark;
        if (!B) { fail("window.Bulwark namespace missing."); return; }
        if (typeof PIXI === "undefined") { fail("PIXI global missing — check vendor/pixi.min.js."); return; }
        if (typeof B.boot !== "function") { fail("Bulwark.boot missing — check src/main.js load."); return; }

        var mountEl = document.getElementById("game-mount");
        if (!mountEl) { fail("#game-mount element missing."); return; }

        // Optional deterministic seed via ?seed=12345 (defaults handled by boot()).
        var seed;
        try {
          var m = /[?&]seed=(\d+)/.exec(window.location.search || "");
          if (m) seed = parseInt(m[1], 10) >>> 0;
        } catch (e) { /* file:// quirks — ignore, use default seed */ }

        try {
          var handle = (seed === undefined) ? B.boot(mountEl) : B.boot(mountEl, seed);
          // Expose the running game handle for debugging / console-driven replay tests.
          B.game = handle;
          // eslint-disable-next-line no-console
          console.log("[Bulwark] booted", seed === undefined ? "(default seed)" : ("seed=" + seed), handle);
        } catch (e) {
          fail("boot() threw: " + (e && e.message ? e.message : String(e)));
          throw e;
        }
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", start);
      } else {
        start();
      }
    })();
  </script>
</body>
</html>
