<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BULWARK — Vertical Slice</title>
<style>
  html,body{margin:0;padding:0;background:#0b0e12;overflow:hidden;height:100%;font-family:monospace;color:#cde;}
  #app{position:fixed;inset:0;}
  canvas{display:block;touch-action:none;}
  #boot{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:#8cf;font-size:18px;z-index:99;}
</style>
</head>
<body>
<div id="app"></div>
<div id="boot">Loading BULWARK…</div>
<script src="vendor/pixi.min.js"></script>
<script type="module">
  import { main } from './src/main.js';
  window.addEventListener('load', () => {
    const boot = document.getElementById('boot');
    try {
      main(document.getElementById('app'));
      if (boot) boot.remove();
    } catch (e) {
      if (boot) boot.textContent = 'Error: ' + (e && e.message ? e.message : e);
      console.error(e);
    }
  });
</script>
</body>
</html>
