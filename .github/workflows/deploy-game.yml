# Publish the Bulwark test-game to GitHub Pages on every push to main that touches it.
# ONLY prototype/test-game ships (the game is fully static) — docs/design/art stay repo-only.
# Play URL: https://rburnett66.github.io/Bulwark-Metamax/
name: Deploy game to Pages
on:
  push:
    branches: [main]
    paths: ['prototype/test-game/**', '.github/workflows/deploy-game.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: prototype/test-game
      - id: deployment
        uses: actions/deploy-pages@v4
