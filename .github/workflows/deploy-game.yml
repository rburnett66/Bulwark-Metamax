# Publish the Bulwark test-game to GitHub Pages on every push to main that touches it.
# ONLY prototype/test-game ships (the game is fully static) — docs/design/art stay repo-only.
# Play URL: https://rburnett66.github.io/Bulwark-Metamax/
name: Deploy game to Pages
on:
  push:
    branches: [main]
    paths: ['prototype/test-game/**', '.github/workflows/deploy-game.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    # Data-contract gates (rendering-tiers spec §5): a Tier C unit whose wave data can exceed
    # MAX_LIVE_3D, or a unit without an explicit render_tier, fails the build before it ships.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node --test prototype/test-game/src/data/renderTiers.test.mjs prototype/test-game/src/render/voxel/pack.test.mjs
  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: prototype/test-game
      - id: deployment
        uses: actions/deploy-pages@v4
